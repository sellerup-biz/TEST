<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST · Allegro Callback</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #F0F7F4; min-height: 100vh; padding: 2rem; color: #333; }
  .container { max-width: 520px; margin: 0 auto; }
  .logo { display: inline-block; background: #0F6E56; color: #fff; font-weight: 800;
          font-size: 14px; padding: 4px 10px; border-radius: 6px; letter-spacing: 2px;
          margin-bottom: 0.5rem; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #0F6E56; margin-bottom: 0.25rem; }
  .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
  .card { background: #fff; border: 1px solid #c8e6dc; border-radius: 12px;
          padding: 1.5rem; margin-bottom: 1rem; }
  .status { padding: 1rem 1.25rem; border-radius: 10px; font-size: 0.9rem;
            line-height: 1.6; margin-bottom: 1rem; font-weight: 500; }
  .status.waiting  { background: #edfaf5; border: 1px solid #a0d5c3; color: #085041; }
  .status.success  { background: #edfaf5; border: 1px solid #0F6E56; color: #0F6E56; }
  .status.error    { background: #fef0f0; border: 1px solid #A32D2D; color: #A32D2D; }
  .status.loading  { background: #edfaf5; border: 1px solid #0F6E56; color: #0F6E56; }
  .code-box { background: #f0f7f4; border: 1px solid #c8e6dc; border-radius: 8px;
              padding: 0.75rem; font-family: monospace; font-size: 0.8rem;
              word-break: break-all; color: #444; margin: 0.75rem 0; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #0F6E56;
             border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;
             vertical-align: middle; margin-right: 0.5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.back { color: #0F6E56; font-size: 0.85rem; text-decoration: none;
           display: inline-block; margin-top: 1rem; }
  a.back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">TEST</div>
  <h1>Allegro Callback</h1>
  <p class="subtitle">Сохранение токена авторизации</p>

  <div class="card" id="main-card">
    <div id="status" class="status waiting">Обработка...</div>
    <div id="content"></div>
  </div>

  <a href="auth.html" class="back">← Вернуться к авторизации</a>
</div>

<script>
async function init() {
  const cfg   = await fetch('config.json').then(r => r.json());
  const REPO  = cfg.repo;
  const NAMES = {};
  cfg.shops.forEach(s => { NAMES[s.env_prefix] = s.name; });

  const params  = new URLSearchParams(window.location.search);
  const code    = params.get('code');
  const error   = params.get('error');

  const shop    = sessionStorage.getItem('pending_shop');
  const ghToken = sessionStorage.getItem('gh_token');

  const statusEl  = document.getElementById('status');
  const contentEl = document.getElementById('content');

  if (error) {
    statusEl.className = 'status error';
    statusEl.textContent = '❌ Allegro вернул ошибку: ' + error;
    return;
  }

  if (!code) {
    statusEl.className = 'status error';
    statusEl.textContent = '❌ Код авторизации не найден в URL.';
    return;
  }

  if (!shop || !ghToken) {
    statusEl.className = 'status waiting';
    statusEl.textContent = '⚠️ Сессия не найдена. Вернись на страницу авторизации.';
    contentEl.innerHTML = `<div class="code-box">${code}</div>
      <p style="font-size:0.82rem;color:#888">Скопируй код выше и вставь вручную в GitHub Secrets (REFRESH_TOKEN_${shop || 'SHOP'}).</p>`;
    return;
  }

  sessionStorage.removeItem('pending_shop');
  const shopName = NAMES[shop] || shop;

  statusEl.className = 'status loading';
  statusEl.innerHTML = `<span class="spinner"></span> Сохраняем токен для <b>${shopName}</b>...`;

  try {
    const resp = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/auth.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `token ${ghToken}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          ref: 'main',
          inputs: { shop: shop, code: code }
        })
      }
    );

    if (resp.status === 204) {
      statusEl.className = 'status loading';
      statusEl.innerHTML = `<span class="spinner"></span> Workflow запущен, обмениваем код на токен...`;
      await new Promise(r => setTimeout(r, 20000));
      statusEl.className = 'status success';
      statusEl.innerHTML = `✅ Токен для <b>${shopName}</b> успешно сохранён в GitHub Secrets!`;
      contentEl.innerHTML = `<p style="margin-top:1rem;font-size:0.85rem;color:#555">
        Теперь можно запускать workflows для сбора данных.</p>`;
    } else {
      const txt = await resp.text();
      statusEl.className = 'status error';
      statusEl.innerHTML = `❌ Ошибка GitHub API (HTTP ${resp.status}):<br><small>${txt.slice(0,200)}</small>`;
    }
  } catch(e) {
    statusEl.className = 'status error';
    statusEl.textContent = '❌ Ошибка: ' + e.message;
  }
}

init();
</script>
</body>
</html>
