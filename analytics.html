<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROCARE · Аналитика</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F7F4;color:#1a1a1a;min-height:100vh;padding:1.75rem}

.hdr{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #c8e6dc;border-radius:14px;padding:12px 18px;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;background:#0F6E56;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;text-align:center;line-height:1.2}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:2px;color:#1a1a1a}
.hdr p{font-size:11px;color:#888;margin-top:2px}
.btn-back{font-size:12px;padding:7px 16px;border-radius:8px;background:#edfaf5;color:#0F6E56;border:1px solid #c8e6dc;cursor:pointer;text-decoration:none;display:inline-block;font-weight:500;white-space:nowrap}
.btn-back:hover{background:#d4f2e7}
.hdr-nav{display:flex;gap:8px;flex-wrap:wrap}

.tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{font-size:12px;padding:7px 18px;border-radius:8px;border:1px solid #c8e6dc;background:#fff;color:#777;cursor:pointer;font-weight:500;transition:all 0.15s}
.tab.on{background:#0F6E56;color:#fff;border-color:#0F6E56;font-weight:700}
.tab:hover:not(.on):not(.future){background:#edfaf5;border-color:#0F6E56;color:#0F6E56}
.tab.future{color:#ccc;border-color:#e0ece8;background:#f5faf8;cursor:default;font-style:italic}

.sl{font-size:9px;font-weight:700;color:#aaa;letter-spacing:1.2px;text-transform:uppercase;margin:0 0 8px 2px}

.c4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.25rem}
@media(max-width:700px){.c4{grid-template-columns:1fr 1fr}}
.mc{background:#fff;border:1px solid #c8e6dc;border-radius:12px;padding:12px 16px}
.mc-l{font-size:10px;color:#888;margin-bottom:6px;font-weight:600}
.mc-v{font-size:18px;font-weight:700;color:#1a1a1a}
.mc-s{font-size:10px;color:#bbb;margin-top:3px}
.mc.tl .mc-v{color:#0F6E56}
.mc.gd{background:#0F6E56;border-color:#0F6E56}
.mc.gd .mc-l{color:rgba(255,255,255,0.75)}
.mc.gd .mc-v{color:#fff;font-size:20px}
.mc.gd .mc-s{color:rgba(255,255,255,0.6)}

.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
@media(max-width:700px){.two{grid-template-columns:1fr}}

.pn{background:#fff;border:1px solid #c8e6dc;border-radius:12px;padding:14px 16px}
.pt{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tag{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700}
.tt{background:#E1F5EE;color:#085041}
.tr{background:#FCEBEB;color:#791F1F}
.ta{background:#FAEEDA;color:#854F0B}

.crow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0faf6;font-size:11px;color:#1a1a1a;gap:8px}
.crow:last-child{border-bottom:none;font-weight:700}
.crow-r{display:flex;align-items:baseline;gap:8px;flex-shrink:0}
.pct{font-size:10px;color:#aaa;min-width:38px;text-align:right}
.neg{color:#A32D2D}
.bi{height:4px;border-radius:2px;margin-top:3px}

.chart-wrap{background:#fff;border:1px solid #c8e6dc;border-radius:12px;padding:14px 16px;margin-bottom:1.25rem}

.tbl{width:100%;font-size:10px;border-collapse:collapse}
.tbl th{text-align:right;padding:5px 6px;color:#aaa;font-weight:600;border-bottom:1px solid #e8f4ef;font-size:9px}
.tbl th:first-child{text-align:left}
.tbl td{text-align:right;padding:5px 6px;border-bottom:1px solid #f0faf6;color:#1a1a1a}
.tbl td:first-child{text-align:left;color:#777}
.tbl tr:last-child td{border:none;font-weight:700}
.neg-c{color:#A32D2D}

.shop-tables{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px;margin-bottom:1.25rem}

.footer{text-align:center;font-size:11px;color:#ccc;margin-top:0.5rem;letter-spacing:1px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">PRO<br>CARE</div>
    <div>
      <h1>PROCARE · Аналитика</h1>
      <p id="hdr-sub">Продажи и расходы по месяцам · в PLN</p>
    </div>
  </div>
  <div class="hdr-nav">
    <div id="syncArea" style="display:inline-flex;gap:4px;margin-right:8px"></div>
    <a href="index.html" class="btn-back">&larr; Главный</a>
    <a href="categories.html" class="btn-back">Категории</a>
    <a href="unit_economy.html" class="btn-back">Юнит-экономика</a>
    <a href="auth.html" class="btn-back">Авторизация</a>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="sl" id="month-label">Продажи за месяц · в PLN</div>
<div class="c4" id="cards"></div>

<div class="two">
  <div class="pn">
    <div class="pt">Расходы по категориям <span class="tag tr" id="tag-costs"></span></div>
    <div id="costs-breakdown"></div>
  </div>
  <div class="pn" style="background:#f5fdf9;border-color:#b0dccb">
    <div class="pt">Сводка месяца <span class="tag tt" id="tag-summary"></span></div>
    <div id="summary-block"></div>
  </div>
</div>

<!-- Детализация по магазинам -->
<div class="sl" id="shop-table-label">Детализация</div>
<div id="shop-table" style="margin-bottom:1.25rem"></div>

<div class="chart-wrap">
  <div class="pt" id="chart-title">Динамика продаж <span class="tag tt">PLN · по месяцам</span></div>
  <canvas id="dynChart" style="width:100%;max-height:260px"></canvas>
</div>

<div class="footer">PROCARE · АНАЛИТИКА · 2026</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
var CONFIG = { shops: [{ name: 'ProCare', color: '#0F6E56', bg: 'rgba(15,110,86,0.18)' }] };
var DATA = { months: [] };
var activeMonth = 0;
var dynChart    = null;

var ALL_MONTHS = [
  "Янв 2026","Фев 2026","Мар 2026","Апр 2026","Май 2026","Июн 2026",
  "Июл 2026","Авг 2026","Сен 2026","Окт 2026","Ноя 2026","Дек 2026"
];

var COST_CATS = ["commission","delivery","ads","subscription","discount"];

function fmt(n){
  return n.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function totalSales(m){
  var s = 0;
  CONFIG.shops.forEach(function(shop){ s += m[shop.name] || 0; });
  return s;
}

function totalCosts(c){
  return (c.commission||0)+(c.delivery||0)+(c.ads||0)+(c.subscription||0);
}

function shopNames(){
  return CONFIG.shops.map(function(s){ return s.name; }).join(' + ');
}

// ── TABS ──────────────────────────────────────────────────────
function renderTabs(){
  var available = DATA.months.map(function(m){ return m.month; });
  document.getElementById('tabs').innerHTML = ALL_MONTHS.map(function(name){
    var idx = available.indexOf(name);
    if(idx !== -1 && idx === activeMonth){
      return '<div class="tab on">'+name+'</div>';
    } else if(idx !== -1){
      return '<div class="tab" onclick="switchMonth('+idx+')">'+name+'</div>';
    } else {
      return '<div class="tab future">'+name+'</div>';
    }
  }).join('');
}

// ── CARDS ─────────────────────────────────────────────────────
function renderCards(){
  var m     = DATA.months[activeMonth];
  var sales = totalSales(m);
  var c     = m.costs || {};
  var costs = totalCosts(c);
  var profit= sales - costs + (c.discount||0);
  var margin= sales > 0 ? (profit/sales*100).toFixed(1) : '0.0';

  var salesLabel = CONFIG.shops.length > 1
    ? CONFIG.shops.length + ' магазина · продажи'
    : CONFIG.shops[0].name + ' · продажи';

  var shopBreakdown = '';
  if(CONFIG.shops.length > 1){
    shopBreakdown = CONFIG.shops.map(function(shop){
      return '<div class="mc-s" style="margin-top:2px;color:#888">' + shop.name + ': ' + fmt(m[shop.name]||0) + ' zł</div>';
    }).join('');
  }

  document.getElementById('cards').innerHTML =
    '<div class="mc tl">'
      +'<div class="mc-l">'+salesLabel+'</div>'
      +'<div class="mc-v">'+fmt(sales)+' zł</div>'
      +'<div class="mc-s">'+m.month+'</div>'
      +shopBreakdown
    +'</div>'
    +'<div class="mc">'
      +'<div class="mc-l" style="color:#A32D2D">Расходы</div>'
      +'<div class="mc-v" style="color:#A32D2D">-'+fmt(costs)+' zł</div>'
      +'<div class="mc-s">'+(sales>0?(costs/sales*100).toFixed(1):0)+'% от продаж</div>'
    +'</div>'
    +'<div class="mc">'
      +'<div class="mc-l" style="color:#0F6E56">Прибыль (оценка)</div>'
      +'<div class="mc-v" style="color:'+( profit>=0?'#0F6E56':'#A32D2D')+'">'+fmt(profit)+' zł</div>'
      +'<div class="mc-s">маржа '+margin+'%</div>'
    +'</div>'
    +'<div class="mc gd">'
      +'<div class="mc-l">Итого (PLN)</div>'
      +'<div class="mc-v">'+fmt(sales)+' zł</div>'
      +'<div class="mc-s">'+m.month+'</div>'
    +'</div>';

  document.getElementById('month-label').textContent = 'Продажи за '+m.month+' · в PLN';
  document.getElementById('tag-costs').textContent   = m.month;
  document.getElementById('tag-summary').textContent = m.month;
}

// ── COSTS BREAKDOWN ───────────────────────────────────────────
function renderCostsBreakdown(){
  var m     = DATA.months[activeMonth];
  var sales = totalSales(m);
  var c     = m.costs || {};
  var net   = totalCosts(c);
  var rows  = [
    {name:'Obowiązkowe (комиссия)', val:c.commission||0,   sign:-1},
    {name:'Dostawa (доставка)',      val:c.delivery||0,     sign:-1},
    {name:'Reklama i promowanie',    val:c.ads||0,          sign:-1},
    {name:'Abonament',               val:c.subscription||0, sign:-1},
    {name:'Rabaty od Allegro',       val:c.discount||0,     sign:+1}
  ];
  var html = rows.map(function(r){
    if(r.val === 0) return '';
    var pct = sales > 0 ? (r.val/sales*100).toFixed(1) : '0.0';
    var sign = r.sign === 1 ? '+' : '-';
    var valCls = r.sign === 1
      ? 'style="color:#0F6E56;font-size:11px;font-weight:600"'
      : 'class="neg" style="font-size:11px;font-weight:600"';
    var pctCls = r.sign === 1
      ? 'style="color:#0F6E56;min-width:38px;text-align:right;font-size:10px"'
      : 'class="pct neg"';
    return '<div class="crow"><span>'+r.name+'</span>'
      +'<div class="crow-r">'
      +'<span '+valCls+'>'+sign+fmt(r.val)+' zł</span>'
      +'<span '+pctCls+'>'+pct+'%</span>'
      +'</div></div>';
  }).join('');
  var netPct = sales > 0 ? (net/sales*100).toFixed(1) : '0.0';
  html += '<div class="crow" style="border-top:1px solid #c8e6dc;margin-top:4px;padding-top:8px">'
    +'<span style="font-weight:700">Итого расходы</span>'
    +'<div class="crow-r">'
    +'<span class="neg" style="font-size:12px;font-weight:700">-'+fmt(net)+' zł</span>'
    +'<span class="pct neg" style="font-weight:700">'+netPct+'%</span>'
    +'</div></div>';
  document.getElementById('costs-breakdown').innerHTML = html;
}

// ── SUMMARY ───────────────────────────────────────────────────
function renderSummaryBlock(){
  var m      = DATA.months[activeMonth];
  var c      = m.costs || {};
  var sales  = totalSales(m);
  var costs  = totalCosts(c);
  var profit = sales - costs + (c.discount||0);
  var margin = sales > 0 ? (profit/sales*100).toFixed(1) : 0;
  var html =
    '<div class="crow"><span>Продажи (PLN)</span>'
    +'<div class="crow-r"><span style="font-weight:600;color:#0F6E56">'+fmt(sales)+' zł</span></div></div>'
   +'<div class="crow"><span>Расходы (PLN)</span>'
    +'<div class="crow-r">'
    +'<span class="neg" style="font-weight:600">-'+fmt(costs)+' zł</span>'
    +'<span class="pct neg">'+(sales>0?(costs/sales*100).toFixed(1):0)+'%</span>'
    +'</div></div>';
  if((c.discount||0) > 0){
    html += '<div class="crow"><span>Rabaty od Allegro</span>'
      +'<div class="crow-r"><span style="color:#0F6E56;font-weight:600">+'+fmt(c.discount||0)+' zł</span></div></div>';
  }
  html += '<div class="crow"><span>Прибыль (оценка)</span>'
    +'<div class="crow-r">'
    +'<span style="font-weight:700;color:'+(profit>=0?'#0F6E56':'#A32D2D')+';font-size:13px">'+fmt(profit)+' zł</span>'
    +'<span class="pct" style="color:'+(profit>=0?'#0F6E56':'#A32D2D')+'">'+margin+'%</span>'
    +'</div></div>';
  document.getElementById('summary-block').innerHTML = html;
}

// ── SHOP TABLE ────────────────────────────────────────────────
function renderShopTable(){
  var m     = DATA.months[activeMonth];
  var c     = m.costs || {};
  var allSales = totalSales(m);
  var net   = totalCosts(c);

  var label = CONFIG.shops.length > 1
    ? 'Детализация по магазинам (' + CONFIG.shops.length + ')'
    : 'Детализация ' + CONFIG.shops[0].name;
  document.getElementById('shop-table-label').textContent = label;

  function buildTable(shopName, shopColor, shopSales, shopCosts){
    var sc = shopCosts;
    var snet = totalCosts(sc);
    var pct = shopSales > 0 ? (snet/shopSales*100).toFixed(1) : '0.0';

    function row(lbl, val, isPos){
      if(val === 0) return '';
      var sign = isPos ? '+' : '-';
      var cls  = isPos ? 'style="color:#0F6E56"' : 'class="neg-c"';
      var pp   = shopSales > 0 ? (val/shopSales*100).toFixed(1) : '0.0';
      return '<tr><td>'+lbl+'</td><td '+cls+'>'+sign+fmt(val)+' zł</td><td '+cls+'>'+pp+'%</td></tr>';
    }

    return '<div class="pn">'
      +'<div class="pt"><span style="color:'+shopColor+'">'+shopName+'</span> <span class="tag tt">'+m.month+'</span></div>'
      +'<table class="tbl">'
      +'<thead><tr><th style="text-align:left">Категория</th><th>Сумма</th><th>% продаж</th></tr></thead>'
      +'<tbody>'
      +'<tr><td>Продажи</td><td>'+fmt(shopSales)+' zł</td><td>100%</td></tr>'
      +row('Obowiązkowe', sc.commission||0, false)
      +row('Dostawa',     sc.delivery||0,   false)
      +row('Reklama',     sc.ads||0,        false)
      +row('Abonament',   sc.subscription||0, false)
      +row('Rabaty',      sc.discount||0,   true)
      +'<tr style="border-top:1px solid #c8e6dc">'
      +'<td style="font-weight:700">Итого расходы</td>'
      +'<td class="neg-c" style="font-weight:700">-'+fmt(snet)+' zł</td>'
      +'<td class="neg-c" style="font-weight:700">'+pct+'%</td>'
      +'</tr>'
      +'</tbody></table></div>';
  }

  var html = '';

  if(CONFIG.shops.length === 1){
    // Single shop: costs go directly to it
    html = buildTable(CONFIG.shops[0].name, CONFIG.shops[0].color, allSales, c);
  } else {
    // Multiple shops: distribute costs proportionally by sales share
    html = '<div class="shop-tables">';
    CONFIG.shops.forEach(function(shop){
      var shopSales = m[shop.name] || 0;
      var share = allSales > 0 ? shopSales / allSales : 0;
      var shopCosts = {
        commission:   (c.commission||0) * share,
        delivery:     (c.delivery||0) * share,
        ads:          (c.ads||0) * share,
        subscription: (c.subscription||0) * share,
        discount:     (c.discount||0) * share
      };
      html += buildTable(shop.name, shop.color, shopSales, shopCosts);
    });
    html += '</div>';
  }

  document.getElementById('shop-table').innerHTML = html;
}

// ── DYNAMIC CHART ─────────────────────────────────────────────
function renderDynChart(){
  var labels = DATA.months.map(function(m){ return m.month; });

  // Stacked shop datasets
  var datasets = CONFIG.shops.map(function(shop){
    return {
      label: shop.name,
      data: DATA.months.map(function(m){ return m[shop.name] || 0; }),
      backgroundColor: shop.bg,
      borderColor: shop.color,
      borderWidth: 2,
      borderRadius: 5,
      stack: 'sales'
    };
  });

  // Costs dataset
  var costsData = DATA.months.map(function(m){
    var c = m.costs || {};
    return totalCosts(c);
  });

  // Cost percentages for labels
  var salesTotals = DATA.months.map(function(m){ return totalSales(m); });
  var costsPct = DATA.months.map(function(m,i){
    return salesTotals[i] > 0 ? parseFloat((costsData[i]/salesTotals[i]*100).toFixed(1)) : 0;
  });

  datasets.push({
    label: 'Расходы (PLN)',
    data: costsData,
    backgroundColor: 'rgba(163,45,45,0.15)',
    borderColor: '#A32D2D',
    borderWidth: 2,
    borderRadius: 5,
    stack: 'costs'
  });

  // Update chart title
  var titleText = CONFIG.shops.length > 1
    ? 'Динамика продаж · ' + CONFIG.shops.length + ' магазина '
    : 'Динамика продаж · ' + CONFIG.shops[0].name + ' ';
  document.getElementById('chart-title').innerHTML = titleText + '<span class="tag tt">PLN · по месяцам</span>';

  if(dynChart) dynChart.destroy();
  dynChart = new Chart(document.getElementById('dynChart').getContext('2d'),{
    type:'bar',
    data:{ labels:labels, datasets:datasets },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{
        legend:{display:true,position:'bottom',labels:{font:{size:10},color:'#777',boxWidth:10,padding:14}},
        tooltip:{callbacks:{label:function(c){
          if(c.dataset.stack === 'costs')
            return ' Расходы: '+fmt(c.parsed.y)+' zł ('+costsPct[c.dataIndex]+'%)';
          return ' '+c.dataset.label+': '+fmt(c.parsed.y)+' zł';
        }}}
      },
      scales:{
        x:{stacked:true,grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:11},color:'#999'}},
        y:{stacked:true,grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:11},color:'#999',
          callback:function(v){ return (v/1000).toFixed(0)+'k zł'; }}}
      }
    },
    plugins:[{
      id:'costLabels',
      afterDatasetDraw:function(chart,args){
        // Draw cost % labels on the costs dataset (last dataset)
        var costsIdx = chart.data.datasets.length - 1;
        if(args.index !== costsIdx) return;
        var ctx  = chart.ctx;
        var meta = chart.getDatasetMeta(costsIdx);
        meta.data.forEach(function(bar,i){
          ctx.save();
          ctx.font='bold 11px Segoe UI,sans-serif';
          ctx.fillStyle='#A32D2D';
          ctx.textAlign='center';
          ctx.textBaseline='bottom';
          ctx.fillText(costsPct[i]+'%', bar.x, bar.y-4);
          ctx.restore();
        });
      }
    }]
  });
}

// ── SWITCH MONTH ──────────────────────────────────────────────
function switchMonth(i){
  activeMonth = i;
  renderTabs();
  renderCards();
  renderCostsBreakdown();
  renderSummaryBlock();
  renderShopTable();
}

function renderAll(){
  // Update header subtitle dynamically
  var sub = CONFIG.shops.length > 1
    ? 'Продажи и расходы по месяцам · ' + CONFIG.shops.length + ' магазина · в PLN'
    : 'Продажи и расходы по месяцам · ' + CONFIG.shops[0].name + ' · в PLN';
  document.getElementById('hdr-sub').textContent = sub;

  renderTabs();
  renderCards();
  renderCostsBreakdown();
  renderSummaryBlock();
  renderShopTable();
  renderDynChart();
}

// ── LOAD ──────────────────────────────────────────────────────
fetch('config.json')
  .then(function(r){ return r.json(); })
  .then(function(cfg){
    if(cfg.shops && cfg.shops.length > 0) CONFIG = cfg;
  })
  .catch(function(){ console.warn('config.json не найден, используем дефолт'); })
  .then(function(){
    return fetch('data.json');
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(!d.months || d.months.length === 0) return;
    DATA = d;
    DATA.months.forEach(function(m){
      if(!m.costs) m.costs = {commission:0,delivery:0,ads:0,subscription:0,discount:0};
    });
    activeMonth = DATA.months.length - 1;
    renderAll();
  })
  .catch(function(){ console.warn('data.json не найден'); });
</script>
<script src="sync.js"></script>
</body>
</html>
