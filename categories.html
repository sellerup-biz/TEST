<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROCARE · Продажи по категориям</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F7F4;color:#1a1a1a;min-height:100vh;padding:1.5rem}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #c8e6dc;border-radius:14px;padding:12px 18px;margin-bottom:1.25rem;flex-wrap:wrap}
.logo{width:42px;height:42px;background:#0F6E56;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0;line-height:1.1;text-align:center;letter-spacing:.5px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:2px;color:#1a1a1a}
.hdr p{font-size:11px;color:#888;margin-top:2px}
.hdr-nav{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.btn-nav{font-size:12px;padding:7px 16px;border-radius:8px;background:#f5fdf9;color:#0F6E56;border:1px solid #c8e6dc;cursor:pointer;text-decoration:none;display:inline-block;font-weight:500;white-space:nowrap;transition:all .15s}
.btn-nav:hover{background:#0F6E56;color:#fff;border-color:#0F6E56}

/* LOADING */
.loading{padding:72px;text-align:center;color:#888;font-size:13px}
.loading-spin{display:inline-block;width:30px;height:30px;border:3px solid #c8e6dc;border-top-color:#0F6E56;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SHOP TABS */
.shop-tabs{background:#fff;border:1px solid #c8e6dc;border-radius:12px;padding:8px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.shop-tabs .tab{font-size:12px;padding:6px 16px;border-radius:20px;border:1px solid #c8e6dc;background:#f5fdf9;color:#666;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap;font-family:inherit}
.shop-tabs .tab:hover:not(.active){border-color:#0F6E56;color:#0F6E56;background:#edfaf5}
.shop-tabs .tab.active{background:#0F6E56;color:#fff;border-color:#0F6E56;font-weight:700}
.shop-tabs-label{font-size:11px;color:#888;font-weight:600;letter-spacing:.3px;white-space:nowrap}

/* DATE BAR */
.date-bar{background:#fff;border:1px solid #c8e6dc;border-radius:12px;padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dpreset{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #c8e6dc;background:#f5fdf9;color:#666;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.dpreset:hover:not(.active){border-color:#0F6E56;color:#0F6E56;background:#edfaf5}
.dpreset.active{background:#0F6E56;color:#fff;border-color:#0F6E56;font-weight:700}
.d-sep{width:1px;height:22px;background:#c8e6dc;flex-shrink:0}
.date-inputs{display:flex;align-items:center;gap:7px}
.date-lbl{font-size:11px;color:#888;white-space:nowrap}
.date-inp{font-size:12px;padding:5px 9px;border:1px solid #c8e6dc;border-radius:8px;background:#f5fdf9;color:#1a1a1a;cursor:pointer;outline:none;font-family:inherit;transition:border-color .15s}
.date-inp:focus{border-color:#0F6E56}
.date-inp::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer}
.date-inp.custom-active{border-color:#0F6E56;background:#edfaf5;color:#0F6E56;font-weight:600}
.date-arrow{font-size:12px;color:#aaa}
.date-badge{margin-left:auto;display:flex;align-items:center;gap:6px}
.d-pill{font-size:10px;padding:3px 9px;border-radius:4px;background:#edfaf5;color:#0F6E56;font-weight:600;white-space:nowrap}
.d-pill.loading-pill{background:#fff3e0;color:#BA7517;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* CHART CARD */
.chart-card{background:#fff;border:1px solid #c8e6dc;border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.chart-title{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.chart-sub{font-size:11px;color:#aaa;margin-bottom:1rem}
.chart-wrap{position:relative;height:360px}

/* TABLE CARD */
.tbl-card{background:#fff;border:1px solid #c8e6dc;border-radius:14px;overflow:hidden;margin-bottom:1rem}
.tbl-header{padding:12px 16px 10px;border-bottom:2px solid #f0faf6;background:#f5fdf9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tbl-header-title{font-size:13px;font-weight:700;color:#1a1a1a}
.sort-wrap{display:flex;align-items:center;gap:6px}
.sort-lbl{font-size:11px;color:#888}
.sort-sel{font-size:12px;padding:5px 10px;border:1px solid #c8e6dc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;outline:none;font-family:inherit}
.sort-sel:focus{border-color:#0F6E56}
.sort-dir{font-size:13px;color:#0F6E56;cursor:pointer;padding:4px 10px;border:1px solid #c8e6dc;border-radius:6px;background:#f5fdf9;user-select:none;line-height:1;transition:all .15s}
.sort-dir:hover{background:#0F6E56;color:#fff;border-color:#0F6E56}

/* TABLE */
.cat-table{width:100%;border-collapse:collapse}
.cat-table th{font-size:10px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;padding:9px 14px;text-align:right;cursor:pointer;user-select:none;white-space:nowrap;background:#f5fdf9;border-bottom:2px solid #f0faf6}
.cat-table th:first-child{text-align:left}
.cat-table th:hover{color:#0F6E56}
.cat-table th.sorted{color:#0F6E56}
.cat-table th .sort-ico{display:inline-block;margin-left:4px;opacity:.5;font-size:9px}
.cat-table th.sorted .sort-ico{opacity:1}
.cat-table td{padding:10px 14px;border-bottom:1px solid #f0faf6;font-size:13px;text-align:right;vertical-align:middle;color:#1a1a1a}
.cat-table td:first-child{text-align:left}
.cat-table tr:last-child td{border-bottom:none}
.cat-table tbody tr:hover td{background:#f5fdf9}
.cat-table tfoot td{background:#f0faf6 !important;border-top:2px solid #c8e6dc}
.cat-name{font-weight:600;color:#1a1a1a;font-size:13px}
.cat-bar-bg{width:100px;height:4px;background:#e0f2ec;border-radius:2px;display:inline-block;position:relative;margin-top:4px}
.cat-bar-fill{height:4px;background:#0F6E56;border-radius:2px;position:absolute;left:0;top:0}
.tc-am{color:#BA7517;font-weight:600}
.tc-gr{color:#0F6E56;font-weight:600}
.tc-rd{color:#A32D2D;font-weight:600}
.tc-nt{color:#888}

.empty{padding:48px;text-align:center;color:#888;font-size:13px}
.error-msg{padding:36px 24px;text-align:center;color:#A32D2D;font-size:13px;background:#fff5f5;border-radius:12px;border:1px solid #f5c0c0;margin:1rem 0}

.topn-wrap{display:flex;align-items:center;gap:6px}

/* FOOTER */
.footer{text-align:center;font-size:11px;color:#aaa;margin-top:.75rem;letter-spacing:1px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">PRO<br>CARE</div>
  <div>
    <h1>PROCARE · Категории</h1>
    <p id="hdrSub">Продажи по категориям · Allegro PL</p>
  </div>
  <div class="hdr-nav">
    <div id="syncArea" style="display:inline-flex;gap:4px;margin-right:8px"></div>
    <a href="index.html" class="btn-nav">← Главный</a>
    <a href="analytics.html" class="btn-nav">Аналитика</a>
    <a href="unit_economy.html" class="btn-nav">Юнит-экономика</a>
    <a href="auth.html" class="btn-nav">Авторизация</a>
  </div>
</div>

<div id="mainContent">
  <div class="loading">
    <div class="loading-spin"></div><br>
    Загрузка каталога и данных…
  </div>
</div>

<div class="footer">PROCARE · КАТЕГОРИИ · 2026</div>

<script>
// ── Constants ─────────────────────────────────────────────────
let CONFIG = null;
let activeShops = [];   // list of shop names currently selected
let selectedShop = 'all';
let topN = 15;

// ── App state ─────────────────────────────────────────────────
let PRODUCTS   = [];
let offerToKey = {};
let monthData  = {};
let loadingYMs = new Set();
let aggCache   = null;

let DATE_MIN   = '2026-01-01';
let DATE_MAX   = '2026-04-02';

let sortCol    = 'revenue';
let sortDir    = 'desc';
let datePreset = 'all';
let dateFrom   = DATE_MIN;
let dateTo     = DATE_MAX;
let dataReady  = false;
let chartInst  = null;

// ── Helpers ───────────────────────────────────────────────────
function zl(n) {
  return Math.round(Math.abs(n)).toLocaleString('ru-RU') + ' zł';
}
function datesInRange(from, to) {
  const dates = [];
  let d = new Date(from);
  const end = new Date(to);
  while (d <= end) {
    dates.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}
function monthsInRange(from, to) {
  const seen = new Set(), result = [];
  for (const ds of datesInRange(from, to)) {
    const ym = ds.slice(0, 7);
    if (!seen.has(ym)) { seen.add(ym); result.push(ym); }
  }
  return result;
}
function productKey(p) {
  if (p.ean) return 'ean:' + p.ean;
  // Use the first available offer ID across all shops
  if (p.offers) {
    for (const shopName of CONFIG.shops.map(s => s.name)) {
      const oid = p.offers[shopName];
      if (oid) return 'offer:' + oid;
    }
  }
  return 'offer:' + Math.random();
}
function escHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Config loading ───────────────────────────────────────────
async function loadConfig() {
  const resp = await fetch('config.json?_=' + Date.now());
  if (!resp.ok) throw new Error('config.json not found');
  CONFIG = await resp.json();
  activeShops = CONFIG.shops.map(s => s.name);
  return CONFIG;
}

// ── Data loading ──────────────────────────────────────────────
async function loadProducts() {
  const resp = await fetch('products.json?_=' + Date.now());
  if (!resp.ok) throw new Error('products.json not found');
  const data = await resp.json();
  PRODUCTS = data.products || [];
  offerToKey = {};
  PRODUCTS.forEach(p => {
    for (const shopName of CONFIG.shops.map(s => s.name)) {
      const oid = p.offers && p.offers[shopName];
      if (oid) offerToKey[oid] = productKey(p);
    }
  });
  if (data.date_min) DATE_MIN = data.date_min;
  if (data.date_max) DATE_MAX = data.date_max;
  if (data.updated)  DATE_MAX = data.updated;
  return data;
}

async function loadMonthData(ym) {
  if (monthData[ym] || loadingYMs.has(ym)) return;
  loadingYMs.add(ym);
  try {
    const resp = await fetch(`unit_data/${ym}.json?_=` + Date.now());
    monthData[ym] = resp.ok ? await resp.json() : { month: ym, days: {} };
  } catch(e) {
    monthData[ym] = { month: ym, days: {} };
  } finally {
    loadingYMs.delete(ym);
  }
}

async function ensureMonthsLoaded(from, to) {
  const yms = monthsInRange(from, to);
  await Promise.all(yms.map(ym => loadMonthData(ym)));
}

// ── Shop selection ───────────────────────────────────────────
function setShop(shop) {
  selectedShop = shop;
  if (shop === 'all') {
    activeShops = CONFIG.shops.map(s => s.name);
  } else {
    activeShops = [shop];
  }
  // Rebuild aggregation and rerender
  aggCache = null;
  buildAggCache(dateFrom, dateTo);
  rerender();
  renderShopTabs();
}

// ── Aggregation ───────────────────────────────────────────────
function buildAggCache(from, to) {
  const agg = {};
  for (const date of datesInRange(from, to)) {
    const ym = date.slice(0, 7);
    const md = monthData[ym];
    if (!md) continue;
    const dayEntry = md.days && md.days[date];
    if (!dayEntry) continue;
    for (const shopName of activeShops) {
      if (!dayEntry[shopName]) continue;
      for (const [oid, vals] of Object.entries(dayEntry[shopName])) {
        const key = offerToKey[oid];
        if (!key) continue;
        if (!agg[key]) agg[key] = { sales: 0, revenue: 0, commission: 0, ads: 0, promo: 0 };
        agg[key].sales      += vals[0] || 0;
        agg[key].revenue    += vals[1] || 0;
        agg[key].commission += vals[2] || 0;
        agg[key].ads        += vals[3] || 0;
        agg[key].promo      += vals[4] || 0;
      }
    }
  }
  aggCache = agg;
}

// ── Category aggregation ──────────────────────────────────────
function buildCategoryData() {
  if (!aggCache) return [];
  const catMap = {};
  for (const p of PRODUCTS) {
    const cat = p.category || 'Остальные';
    const key = productKey(p);
    if (!catMap[cat]) {
      catMap[cat] = { revenue: 0, sales: 0, commission: 0, ads: 0, promo: 0, skus: new Set(), activeSKUs: new Set() };
    }
    catMap[cat].skus.add(key);
    const a = aggCache[key];
    if (!a) continue;
    catMap[cat].revenue    += a.revenue;
    catMap[cat].sales      += a.sales;
    catMap[cat].commission += a.commission;
    catMap[cat].ads        += a.ads;
    catMap[cat].promo      += a.promo;
    if (a.sales > 0) catMap[cat].activeSKUs.add(key);
  }
  const totalRevenue = Object.values(catMap).reduce((s, c) => s + c.revenue, 0);
  return Object.entries(catMap).map(([name, c]) => {
    const marginAmt = c.revenue - c.commission - c.ads - c.promo;
    return {
      name,
      revenue:    Math.round(c.revenue    * 100) / 100,
      sales:      c.sales,
      commission: Math.round(c.commission * 100) / 100,
      ads:        Math.round(c.ads        * 100) / 100,
      promo:      Math.round(c.promo      * 100) / 100,
      skuCount:   c.skus.size,
      activeSkuCount: c.activeSKUs.size,
      pctRevenue: totalRevenue > 0 ? c.revenue / totalRevenue * 100 : 0,
      marginAmt:  Math.round(marginAmt * 100) / 100,
      marginPct:  c.revenue > 0 ? marginAmt / c.revenue * 100 : 0,
    };
  });
}

function sortCategories(arr) {
  return [...arr].sort((a, b) => {
    let va, vb;
    if      (sortCol === 'revenue')   { va = a.revenue;    vb = b.revenue; }
    else if (sortCol === 'sales')     { va = a.sales;      vb = b.sales; }
    else if (sortCol === 'pct')       { va = a.pctRevenue; vb = b.pctRevenue; }
    else if (sortCol === 'skus')      { va = a.skuCount;   vb = b.skuCount; }
    else if (sortCol === 'marginPct') { va = a.marginPct;  vb = b.marginPct; }
    else                              { va = a.revenue;    vb = b.revenue; }
    return sortDir === 'desc' ? vb - va : va - vb;
  });
}

// ── Chart render ──────────────────────────────────────────────
function renderChart(cats) {
  const bySales = [...cats].sort((a, b) => b.revenue - a.revenue);
  const top  = bySales.slice(0, topN);
  const rest = bySales.slice(topN);

  const chartData = [...top];
  if (rest.length > 0) {
    const restRev    = rest.reduce((s, c) => s + c.revenue,    0);
    const restSales  = rest.reduce((s, c) => s + c.sales,      0);
    const restComm   = rest.reduce((s, c) => s + c.commission, 0);
    const restAds    = rest.reduce((s, c) => s + c.ads,        0);
    const restPromo  = rest.reduce((s, c) => s + c.promo,      0);
    const total      = cats.reduce((s, c) => s + c.revenue,    0);
    const restMargin = restRev - restComm - restAds - restPromo;
    chartData.push({
      name: `Остальные (${rest.length})`,
      revenue:    restRev,
      sales:      restSales,
      commission: restComm,
      ads:        restAds,
      promo:      restPromo,
      pctRevenue: total > 0 ? restRev / total * 100 : 0,
      marginAmt:  restMargin,
      marginPct:  restRev > 0 ? restMargin / restRev * 100 : 0,
      _isOther:   true,
    });
  }

  const labels = chartData.map(c => c.name);
  const values = chartData.map(c => Math.round(c.revenue));
  const pcts   = chartData.map(c => c.pctRevenue);

  // Green palette for ProCare
  const greenPalette = [
    '#0F6E56','#1a8c6e','#13a07a','#0d7a62','#15b38a',
    '#0a5e48','#22c49c','#0e9070','#18d4a8','#0b6e58',
    '#1fb896','#0c7a60','#25d0b0','#096050','#30e0be',
  ];
  const colors = chartData.map((c, i) =>
    c._isOther ? 'rgba(160,185,175,0.70)' : (greenPalette[i % greenPalette.length] + 'cc')
  );
  const borderColors = chartData.map((c, i) =>
    c._isOther ? 'rgba(140,165,155,1)' : greenPalette[i % greenPalette.length]
  );

  // Rebuild canvas (clean slate avoids Chart.js resize glitches)
  const wrap = document.getElementById('catChartWrap');
  if (!wrap) return;
  wrap.innerHTML = '<canvas id="catChart"></canvas>';
  const ctx = document.getElementById('catChart');

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Выручка (zł)',
        data: values,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          titleColor: '#1a1a1a',
          bodyColor: '#444',
          borderColor: '#c8e6dc',
          borderWidth: 1,
          callbacks: {
            label: (ctx) => {
              const i = ctx.dataIndex;
              const v = ctx.parsed.y;
              const p = pcts[i].toFixed(1);
              const s = chartData[i].sales;
              return [
                `Выручка: ${v.toLocaleString('ru-RU')} zł`,
                `Доля: ${p}%`,
                `Продано: ${s.toLocaleString('ru-RU')} шт.`,
              ];
            }
          }
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { size: 10, family: "'Segoe UI', system-ui, sans-serif" },
            maxRotation: 35,
            minRotation: 25,
            color: '#888',
            callback: function(val, i) {
              const lbl = labels[i];
              return lbl.length > 18 ? lbl.slice(0, 16) + '…' : lbl;
            }
          }
        },
        y: {
          grid: { color: '#f0faf6' },
          ticks: {
            font: { size: 10 },
            color: '#888',
            callback: v => v.toLocaleString('ru-RU') + ' zł'
          }
        }
      },
      animation: {
        onComplete: function() {
          const chart = this;
          const ctx2  = chart.ctx;
          ctx2.save();
          ctx2.font = 'bold 10px Segoe UI, system-ui, sans-serif';
          ctx2.textAlign = 'center';
          ctx2.textBaseline = 'bottom';
          chart.data.datasets.forEach((ds, di) => {
            const meta = chart.getDatasetMeta(di);
            meta.data.forEach((bar, i) => {
              const v = ds.data[i];
              const p = pcts[i].toFixed(1);
              const y = bar.y - 4;
              ctx2.fillStyle = '#555';
              ctx2.fillText(v.toLocaleString('ru-RU') + ' zł', bar.x, y);
              ctx2.fillStyle = '#BA7517';
              ctx2.fillText(p + '%', bar.x, y - 13);
            });
          });
          ctx2.restore();
        }
      }
    }
  });
}

// ── Table render ──────────────────────────────────────────────
function renderTable(cats) {
  const sorted = sortCategories(cats);
  const maxRev = cats.length > 0 ? Math.max(...cats.map(c => c.revenue)) : 1;

  const colDef = [
    { id: 'name',      label: 'Категория',       align: 'left' },
    { id: 'revenue',   label: 'Выручка',         align: 'right' },
    { id: 'sales',     label: 'Кол-во шт.',      align: 'right' },
    { id: 'pct',       label: '% продаж',        align: 'right' },
    { id: 'skus',      label: 'SKU в категории', align: 'right' },
    { id: 'marginPct', label: 'Маржа %',         align: 'right' },
  ];

  const ico = col => {
    if (sortCol !== col) return `<span class="sort-ico">↕</span>`;
    return `<span class="sort-ico">${sortDir === 'desc' ? '↓' : '↑'}</span>`;
  };

  const headHtml = colDef.map(c =>
    `<th class="${sortCol === c.id && c.id !== 'name' ? 'sorted' : ''}" style="text-align:${c.align}"${c.id !== 'name' ? ` onclick="setSort('${c.id}')"` : ''}>${c.label}${c.id !== 'name' ? ico(c.id) : ''}</th>`
  ).join('');

  const rowsHtml = sorted.map(c => {
    const barW  = maxRev > 0 ? Math.round(c.revenue / maxRev * 100) : 0;
    const mpCls = c.marginPct >= 30 ? 'tc-gr' : c.marginPct >= 10 ? 'tc-am' : 'tc-rd';
    const mSign = c.marginAmt < 0 ? '-' : '';
    return `<tr>
      <td>
        <div class="cat-name">${escHtml(c.name)}</div>
        <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${barW}%"></div></div>
      </td>
      <td class="tc-am">${zl(c.revenue)}</td>
      <td>${c.sales.toLocaleString('ru-RU')} шт.</td>
      <td><span style="font-weight:700">${c.pctRevenue.toFixed(1)}%</span></td>
      <td class="tc-nt">${c.skuCount}</td>
      <td class="${mpCls}">${c.marginPct.toFixed(1)}%<small style="display:block;font-size:10px;color:#aaa;font-weight:400">${mSign}${zl(c.marginAmt)}</small></td>
    </tr>`;
  }).join('');

  // Footer totals
  const sumRevenue    = cats.reduce((s, c) => s + c.revenue,    0);
  const sumSales      = cats.reduce((s, c) => s + c.sales,      0);
  const sumCommission = cats.reduce((s, c) => s + c.commission, 0);
  const sumAds        = cats.reduce((s, c) => s + c.ads,        0);
  const sumPromo      = cats.reduce((s, c) => s + c.promo,      0);
  const sumMarginAmt  = sumRevenue - sumCommission - sumAds - sumPromo;
  const sumMarginPct  = sumRevenue > 0 ? sumMarginAmt / sumRevenue * 100 : 0;
  const mpC2   = sumMarginPct >= 30 ? 'tc-gr' : sumMarginPct >= 10 ? 'tc-am' : 'tc-rd';
  const mSign2 = sumMarginAmt < 0 ? '-' : '';

  const footerHtml = `<tr>
    <td style="font-weight:700;font-size:12px">Итого (${cats.length} категорий)</td>
    <td class="tc-am" style="font-weight:700">${zl(sumRevenue)}</td>
    <td style="font-weight:700">${sumSales.toLocaleString('ru-RU')} шт.</td>
    <td style="font-weight:700">100%</td>
    <td class="tc-nt">—</td>
    <td class="${mpC2}" style="font-weight:700">${sumMarginPct.toFixed(1)}%<small style="display:block;font-size:10px;color:#aaa;font-weight:400">${mSign2}${zl(sumMarginAmt)}</small></td>
  </tr>`;

  document.getElementById('catTbl').innerHTML = `
    <table class="cat-table">
      <thead><tr>${headHtml}</tr></thead>
      <tbody>${rowsHtml}</tbody>
      <tfoot>${footerHtml}</tfoot>
    </table>`;
}

// ── Sort & Controls ───────────────────────────────────────────
function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else { sortCol = col; sortDir = 'desc'; }
  rerender();
}

function toggleSortDir() {
  sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  rerender();
}

function setTopN(n) {
  topN = n;
  const el = document.getElementById('chartTitle');
  if (el) el.textContent = `Топ ${topN} категорий по выручке`;
  const cats = buildCategoryData();
  if (cats.length > 0) renderChart(cats);
}

// ── Loading pill ──────────────────────────────────────────────
function showLoadingPill(on) {
  const el = document.getElementById('loadPill');
  if (el) el.style.display = on ? '' : 'none';
}

// ── Date helpers ──────────────────────────────────────────────
function getPeriodDays() {
  const from = new Date(dateFrom), to = new Date(dateTo);
  return Math.max(1, Math.round((to - from) / 86400000) + 1);
}

function setDatePreset(p) {
  datePreset = p;
  if (p === 'all') {
    dateFrom = DATE_MIN;
    dateTo   = DATE_MAX;
  } else if (p === 'last30') {
    const d = new Date(DATE_MAX);
    d.setDate(d.getDate() - 29);
    dateFrom = d.toISOString().slice(0, 10);
    dateTo   = DATE_MAX;
  }
  refresh().then(() => renderDateBar());
}

function setCustomDate(which, val) {
  datePreset = 'custom';
  if (which === 'from') dateFrom = val;
  else dateTo = val;
  refresh().then(() => renderDateBar());
}

// ── Refresh & Rerender ────────────────────────────────────────
async function refresh() {
  if (!dataReady) return;
  aggCache = null;
  showLoadingPill(true);
  await ensureMonthsLoaded(dateFrom, dateTo);
  showLoadingPill(false);
  buildAggCache(dateFrom, dateTo);
  rerender();
}

function rerender() {
  const cats = buildCategoryData();

  if (cats.length === 0) {
    const wrap = document.getElementById('catChartWrap');
    if (wrap) wrap.innerHTML = '<div class="empty">Нет данных за выбранный период</div>';
    const tbl = document.getElementById('catTbl');
    if (tbl) tbl.innerHTML = '<div class="empty">Нет данных за выбранный период</div>';
    renderHeaderStats([]);
    return;
  }

  renderChart(cats);
  renderTable(cats);
  renderHeaderStats(cats);

  // Sync sort direction button text
  const dirBtn = document.getElementById('sortDirBtn');
  if (dirBtn) dirBtn.textContent = sortDir === 'desc' ? '↓' : '↑';
}

function renderHeaderStats(cats) {
  const total      = cats.reduce((s, c) => s + c.revenue, 0);
  const totalSales = cats.reduce((s, c) => s + c.sales,   0);
  const days       = getPeriodDays();
  const shopLabel  = selectedShop === 'all' ? 'Все магазины' : selectedShop;
  const parts = [];
  if (cats.length > 0) parts.push(`${cats.length} кат.`);
  if (total > 0)        parts.push(zl(total));
  if (totalSales > 0)   parts.push(`${totalSales.toLocaleString('ru-RU')} шт.`);
  parts.push(`${days} дн.`);
  document.getElementById('hdrSub').textContent =
    'Продажи по категориям · ' + shopLabel + ' · ' + parts.join(' · ');
}

// ── Shop tabs render ─────────────────────────────────────────
function renderShopTabs() {
  const container = document.getElementById('shopTabs');
  if (!container) return;
  let html = `<span class="shop-tabs-label">МАГАЗИН:</span>`;
  html += `<button class="tab${selectedShop === 'all' ? ' active' : ''}" onclick="setShop('all')">Все</button>`;
  for (const shop of CONFIG.shops) {
    const isActive = selectedShop === shop.name;
    html += `<button class="tab${isActive ? ' active' : ''}" onclick="setShop('${escHtml(shop.name)}')">${escHtml(shop.name)}</button>`;
  }
  container.innerHTML = html;
}

// ── Date bar render ───────────────────────────────────────────
function renderDateBar() {
  const days = getPeriodDays();
  const fmt  = s => s.split('-').reverse().join('.');
  const periodLabel = datePreset === 'all'
    ? `Весь период · ${days} дн.`
    : datePreset === 'last30'
    ? `Последние 30 дней · ${days} дн.`
    : `${fmt(dateFrom)} — ${fmt(dateTo)} · ${days} дн.`;

  document.getElementById('dateBar').innerHTML = `
    <span style="font-size:11px;color:#888;font-weight:600;letter-spacing:.3px">ПЕРИОД:</span>
    <button class="dpreset${datePreset === 'all' ? ' active' : ''}" onclick="setDatePreset('all')">Все время</button>
    <button class="dpreset${datePreset === 'last30' ? ' active' : ''}" onclick="setDatePreset('last30')">Последние 30 дней</button>
    <div class="d-sep"></div>
    <div class="date-inputs">
      <span class="date-lbl">С</span>
      <input class="date-inp${datePreset === 'custom' ? ' custom-active' : ''}" type="date" id="dateFromInp"
        value="${dateFrom}" min="${DATE_MIN}" max="${DATE_MAX}"
        onchange="setCustomDate('from', this.value)">
      <span class="date-arrow">→</span>
      <span class="date-lbl">По</span>
      <input class="date-inp${datePreset === 'custom' ? ' custom-active' : ''}" type="date" id="dateToInp"
        value="${dateTo}" min="${DATE_MIN}" max="${DATE_MAX}"
        onchange="setCustomDate('to', this.value)">
    </div>
    <div class="date-badge">
      <span class="d-pill">${periodLabel}</span>
      <span class="d-pill loading-pill" id="loadPill" style="display:none">⟳ загрузка…</span>
    </div>`;
}

// ── Full UI skeleton ──────────────────────────────────────────
function renderSkeleton() {
  document.getElementById('mainContent').innerHTML = `
    <div class="shop-tabs" id="shopTabs"></div>
    <div class="date-bar" id="dateBar"></div>
    <div class="chart-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">
        <div class="chart-title" id="chartTitle">Топ ${topN} категорий по выручке</div>
        <div class="topn-wrap">
          <span style="font-size:11px;color:#888">Показывать топ:</span>
          <select class="sort-sel" id="topNSel" onchange="setTopN(+this.value)">
            <option value="5"  ${topN === 5  ? 'selected' : ''}>5</option>
            <option value="10" ${topN === 10 ? 'selected' : ''}>10</option>
            <option value="15" ${topN === 15 ? 'selected' : ''}>15</option>
            <option value="20" ${topN === 20 ? 'selected' : ''}>20</option>
            <option value="30" ${topN === 30 ? 'selected' : ''}>30</option>
          </select>
        </div>
      </div>
      <div class="chart-sub">Остальные категории объединены в группу «Остальные»</div>
      <div class="chart-wrap" id="catChartWrap"><canvas id="catChart"></canvas></div>
    </div>
    <div class="tbl-card">
      <div class="tbl-header">
        <span class="tbl-header-title">Все категории · сводная таблица</span>
        <div class="sort-wrap">
          <span class="sort-lbl">Сортировка:</span>
          <select class="sort-sel" onchange="setSort(this.value)">
            <option value="revenue"   ${sortCol === 'revenue'   ? 'selected' : ''}>По выручке</option>
            <option value="sales"     ${sortCol === 'sales'     ? 'selected' : ''}>По кол-ву</option>
            <option value="pct"       ${sortCol === 'pct'       ? 'selected' : ''}>По % продаж</option>
            <option value="skus"      ${sortCol === 'skus'      ? 'selected' : ''}>По кол-ву SKU</option>
            <option value="marginPct" ${sortCol === 'marginPct' ? 'selected' : ''}>По марже</option>
          </select>
          <button class="sort-dir" id="sortDirBtn" onclick="toggleSortDir()">${sortDir === 'desc' ? '↓' : '↑'}</button>
        </div>
      </div>
      <div id="catTbl"></div>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  try {
    await loadConfig();
    const data = await loadProducts();
    dateFrom = DATE_MIN;
    dateTo   = DATE_MAX;

    // Load all months in the full date range upfront
    await ensureMonthsLoaded(DATE_MIN, DATE_MAX);

    dataReady = true;

    renderSkeleton();
    renderShopTabs();
    renderDateBar();
    buildAggCache(dateFrom, dateTo);
    rerender();

  } catch(e) {
    if (e.message && e.message.includes('products.json not found')) {
      document.getElementById('mainContent').innerHTML =
        `<div class="error-msg">⚠ products.json не найден. Запусти fetch_offers.yml для загрузки данных.</div>`;
    } else if (e.message && e.message.includes('config.json not found')) {
      document.getElementById('mainContent').innerHTML =
        `<div class="error-msg">⚠ config.json не найден.</div>`;
    } else {
      document.getElementById('mainContent').innerHTML =
        `<div class="error-msg">Ошибка загрузки данных: ${escHtml(e.message)}</div>`;
    }
  }
}

init();
</script>
<script src="sync.js"></script>
</body>
</html>
