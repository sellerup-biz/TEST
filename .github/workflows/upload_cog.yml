name: Upload COG (update prices)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-cog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas openpyxl xlrd
      - name: Update COG in products.json
        run: python update_cog.py
      - name: Commit updated products.json
        run: |
          git config user.name "github-actions"
          git config user.email "bot@procare"
          git add products.json
          git diff --staged --quiet || git commit -m "Update COG $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
