name: Auth — Exchange code for refresh_token

on:
  workflow_dispatch:
    inputs:
      shop:
        description: 'Shop env_prefix (e.g. PROCARE, SHOP2, SHOP3...)'
        required: true
        default: 'PROCARE'
      code:
        description: 'Authorization code from Allegro'
        required: true

jobs:
  auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests PyNaCl
      - name: Exchange code for token
        run: python auth_exchange.py
        env:
          SHOP:                   ${{ github.event.inputs.shop }}
          CODE:                   ${{ github.event.inputs.code }}
          GH_TOKEN:               ${{ secrets.GH_TOKEN }}
          # All shop credentials
          CLIENT_ID_PROCARE:      ${{ secrets.CLIENT_ID_PROCARE }}
          CLIENT_SECRET_PROCARE:  ${{ secrets.CLIENT_SECRET_PROCARE }}
          CLIENT_ID_SHOP2:        ${{ secrets.CLIENT_ID_SHOP2 }}
          CLIENT_SECRET_SHOP2:    ${{ secrets.CLIENT_SECRET_SHOP2 }}
          CLIENT_ID_SHOP3:        ${{ secrets.CLIENT_ID_SHOP3 }}
          CLIENT_SECRET_SHOP3:    ${{ secrets.CLIENT_SECRET_SHOP3 }}
          CLIENT_ID_SHOP4:        ${{ secrets.CLIENT_ID_SHOP4 }}
          CLIENT_SECRET_SHOP4:    ${{ secrets.CLIENT_SECRET_SHOP4 }}
          CLIENT_ID_SHOP5:        ${{ secrets.CLIENT_ID_SHOP5 }}
          CLIENT_SECRET_SHOP5:    ${{ secrets.CLIENT_SECRET_SHOP5 }}
